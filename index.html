<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="card">
      <h1>Registration Form</h1>
      <form id="regForm" method="post">
        <label for="name">Name</label>
        <input
          id="name"
          name="name"
          type="text"
          placeholder="Full name"
          required
        />

        <label for="dob">Date of Birth</label>
        <input id="dob" name="dob" type="date" required />

        <label for="country">Country</label>
        <select name="country" placeholder="select country" required>
          <option value="" disabled selected hidden>Select your country</option>

          <option value="am">America</option>
          <option value="au">Australia</option>
          <option value="ch">China</option>
          <option value="ca">Canada</option>
          <option value="in">India</option>
          <option value="ja">Japan</option>
        </select>

        <label for="state">State</label>
        <select name="state" required>
          <option value="" disabled selected hidden>Select your state</option>

          <option value="ap">Andhra Pradesh</option>
          <option value="tx">Karnataka</option>
          <option value="ny">Kerala</option>
          <option value="ca">Tamil Nadu</option>
          <option value="Tl">Telangana</option>
        </select>

        <label for="address-line1">Address Line 1</label>
        <input type="text" id="address1" name="address1" required />

        <label for="address-line2">Address Line 2</label>
        <input type="text" id="address2" name="address2" />

        <label for="city">City</label>
        <input type="text" id="city" name="city" required />

        <label for="pin">Pin Code</label>
        <input type="tel" id="pin" name="pin" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required />

        <label>Select Courses</label>

        <input type="checkbox" id="course-web" name="courses" value="web_dev" />
        <label for="course-web">Web Development</label>

        <input
          type="checkbox"
          id="course-data"
          name="courses"
          value="data_science"
        />
        <label for="course-data">Data Science</label>

        <input type="checkbox" id="course-ai" name="courses" value="ai_ml" />
        <label for="course-ai">AI & Machine Learning</label>

        <label for="res">Residence</label>

        <input
          type="radio"
          id="status-indian"
          name="citizenship"
          value="indian"
          checked
        />
        <label for="status-indian">Indian</label>

        <input type="radio" id="status-nri" name="citizenship" value="nri" />
        <label for="status-nri">NRI</label>

        <label for="mobile">Mobile</label>
        <input type="tel" id="mobile" name="mobile" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required /><br />

        <button type="submit">Submit</button>
        <button type="submit">Clear</button>
      </form>
      <div id="message" role="status" aria-live="polite"></div>
    </div>

    <script src="main.js" defer></script>
  </body>
</html>
